<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Quiz! 🎂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ── Party bunting flags along the top ── -->
    <svg class="bunting" viewBox="0 0 800 46" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 4 Q 400 14 800 4" stroke="#8A6FBF" stroke-width="4" fill="none"/>
        <polygon points="20,8 60,8 40,42"  fill="#FF6B9D"/>
        <polygon points="90,10 130,10 110,44"  fill="#FFD93D"/>
        <polygon points="160,11 200,11 180,45" fill="#6BCB77"/>
        <polygon points="230,12 270,12 250,46" fill="#4D96FF"/>
        <polygon points="300,13 340,13 320,46" fill="#FF9F45"/>
        <polygon points="370,13 410,13 390,46" fill="#C780FA"/>
        <polygon points="440,13 480,13 460,46" fill="#FF6B9D"/>
        <polygon points="510,12 550,12 530,46" fill="#FFD93D"/>
        <polygon points="580,11 620,11 600,45" fill="#6BCB77"/>
        <polygon points="650,10 690,10 670,44" fill="#4D96FF"/>
        <polygon points="720,8 760,8 740,42"  fill="#FF9F45"/>
    </svg>

    <!-- ── Floating background decorations ── -->
    <div class="decorations" aria-hidden="true">
        <div class="bg-balloon b1"></div>
        <div class="bg-balloon b2"></div>
        <div class="bg-balloon b3"></div>
        <div class="bg-balloon b4"></div>
        <span class="drift d1">🎂</span>
        <span class="drift d2">🎁</span>
        <span class="drift d3">🎉</span>
        <span class="drift d4">⭐</span>
        <span class="drift d5">🧁</span>
    </div>

    <main class="wrap">

        <!-- ══════════ START SCREEN ══════════ -->
        <section id="start-screen" class="screen">
            <h1 class="title">🎂 Birthday Quiz! 🎉</h1>
            <p class="subtitle">Answer all <strong>10 questions</strong> to join the party! 🥳</p>
            <p class="warning">⚠️ One wrong answer sends you back to the start!</p>
            <button id="start-btn" class="big-btn" type="button">Let's Play! 🎈</button>
        </section>

        <!-- ══════════ QUIZ SCREEN ══════════ -->
        <section id="quiz-screen" class="screen hidden">
            <div class="progress">
                <p id="q-number" class="q-number">Question 1 of 10</p>
                <div id="dots" class="dots"></div>
            </div>

            <div id="stage" class="stage">
                <div class="question-card">
                    <p id="q-text" class="q-text">Question text here</p>
                </div>

                <div class="answers">
                    <button id="answer-a" class="answer answer-a" type="button">
                        <span class="badge">A</span>
                        <span id="opt-a-text" class="opt-text">Option A</span>
                    </button>
                    <button id="answer-b" class="answer answer-b" type="button">
                        <span class="badge">B</span>
                        <span id="opt-b-text" class="opt-text">Option B</span>
                    </button>
                </div>

                <div id="flash" class="flash" aria-hidden="true"></div>
            </div>
        </section>

        <!-- ══════════ OOPS OVERLAY ══════════ -->
        <div id="oops-overlay" class="overlay hidden" role="alert">
            <div class="oops-card">
                <div class="oops-emoji">😅</div>
                <h2>Oops! Wrong answer!</h2>
                <p>Back to question 1&hellip;</p>
            </div>
        </div>

        <!-- ══════════ CELEBRATION SCREEN ══════════ -->
        <section id="celebration-screen" class="screen celebration hidden">
            <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>

            <h2 class="hooray">🎉 HOORAY! 🎉</h2>
            <p class="hooray-sub">You got all 10 right — Happy Birthday!</p>

            <!-- Cartoon kid with party hat, holding a birthday cake -->
            <svg class="character" viewBox="0 0 220 285" role="img"
                 aria-label="Cartoon kid wearing a party hat and holding a birthday cake">
                <!-- legs -->
                <rect x="88"  y="208" width="15" height="52" rx="7" fill="#5B7DB1" stroke="#4A3B52" stroke-width="3"/>
                <rect x="117" y="208" width="15" height="52" rx="7" fill="#5B7DB1" stroke="#4A3B52" stroke-width="3"/>
                <!-- shoes -->
                <ellipse cx="93"  cy="264" rx="16" ry="9" fill="#E05263" stroke="#4A3B52" stroke-width="3"/>
                <ellipse cx="127" cy="264" rx="16" ry="9" fill="#E05263" stroke="#4A3B52" stroke-width="3"/>
                <!-- body / shirt -->
                <rect x="76" y="124" width="68" height="92" rx="22" fill="#4ECDC4" stroke="#4A3B52" stroke-width="3"/>
                <!-- head -->
                <circle cx="110" cy="84" r="40" fill="#FFDCB8" stroke="#4A3B52" stroke-width="3"/>
                <!-- ears -->
                <circle cx="69"  cy="88" r="7" fill="#FFDCB8" stroke="#4A3B52" stroke-width="3"/>
                <circle cx="151" cy="88" r="7" fill="#FFDCB8" stroke="#4A3B52" stroke-width="3"/>
                <!-- hair peeking under the hat -->
                <path d="M 71 76 Q 110 30 149 76 Q 110 56 71 76 Z" fill="#7A4E2D"/>
                <!-- party hat -->
                <polygon points="110,8 83,60 137,60" fill="#FF6B9D" stroke="#4A3B52" stroke-width="3"/>
                <circle cx="103" cy="42" r="4" fill="#FFF"/>
                <circle cx="118" cy="52" r="4" fill="#FFF"/>
                <circle cx="110" cy="27" r="3.4" fill="#FFF"/>
                <circle class="pompom" cx="110" cy="9" r="8" fill="#FFD93D" stroke="#4A3B52" stroke-width="3"/>
                <!-- face -->
                <circle cx="95"  cy="82" r="5" fill="#33262E"/>
                <circle cx="125" cy="82" r="5" fill="#33262E"/>
                <circle cx="96.6" cy="80.4" r="1.7" fill="#FFF"/>
                <circle cx="126.6" cy="80.4" r="1.7" fill="#FFF"/>
                <circle cx="81"  cy="96" r="7" fill="#FFA8A8" opacity="0.6"/>
                <circle cx="139" cy="96" r="7" fill="#FFA8A8" opacity="0.6"/>
                <path d="M 94 98 Q 110 122 126 98 Z" fill="#8C2F39"/>
                <ellipse cx="110" cy="108" rx="8" ry="4.5" fill="#FF7B8A"/>
                <!-- arms reaching to hold the cake -->
                <path d="M 81 140 Q 63 168 88 192" stroke="#FFDCB8" stroke-width="13" stroke-linecap="round" fill="none"/>
                <path d="M 139 140 Q 157 168 132 192" stroke="#FFDCB8" stroke-width="13" stroke-linecap="round" fill="none"/>
                <!-- cake plate -->
                <ellipse cx="110" cy="204" rx="47" ry="10" fill="#E9EDF5" stroke="#4A3B52" stroke-width="3"/>
                <!-- candles (behind cake top edge) -->
                <g>
                    <rect x="91"  y="148" width="6" height="22" rx="2" fill="#FF9F45" stroke="#4A3B52" stroke-width="2"/>
                    <rect x="107" y="146" width="6" height="24" rx="2" fill="#6BCB77" stroke="#4A3B52" stroke-width="2"/>
                    <rect x="123" y="148" width="6" height="22" rx="2" fill="#4D96FF" stroke="#4A3B52" stroke-width="2"/>
                    <g class="flame"><ellipse cx="94"  cy="141" rx="4.5" ry="7.5" fill="#FFD93D"/><ellipse cx="94"  cy="143" rx="2" ry="3.5" fill="#FF9F45"/></g>
                    <g class="flame f2"><ellipse cx="110" cy="139" rx="4.5" ry="7.5" fill="#FFD93D"/><ellipse cx="110" cy="141" rx="2" ry="3.5" fill="#FF9F45"/></g>
                    <g class="flame f3"><ellipse cx="126" cy="141" rx="4.5" ry="7.5" fill="#FFD93D"/><ellipse cx="126" cy="143" rx="2" ry="3.5" fill="#FF9F45"/></g>
                </g>
                <!-- cake body -->
                <rect x="76" y="168" width="68" height="34" rx="8" fill="#FBD1E0" stroke="#4A3B52" stroke-width="3"/>
                <!-- frosting drips -->
                <rect x="76" y="168" width="68" height="10" rx="5" fill="#FFF6FA"/>
                <circle cx="88"  cy="180" r="6" fill="#FFF6FA"/>
                <circle cx="104" cy="182" r="6" fill="#FFF6FA"/>
                <circle cx="120" cy="180" r="6" fill="#FFF6FA"/>
                <circle cx="134" cy="181" r="5" fill="#FFF6FA"/>
                <!-- sprinkles -->
                <rect x="90"  y="190" width="6" height="2.6" rx="1.3" fill="#FF6B9D" transform="rotate(20 93 191)"/>
                <rect x="108" y="193" width="6" height="2.6" rx="1.3" fill="#4D96FF" transform="rotate(-15 111 194)"/>
                <rect x="126" y="190" width="6" height="2.6" rx="1.3" fill="#6BCB77" transform="rotate(30 129 191)"/>
                <!-- hands on the cake -->
                <circle cx="86"  cy="190" r="9" fill="#FFDCB8" stroke="#4A3B52" stroke-width="3"/>
                <circle cx="134" cy="190" r="9" fill="#FFDCB8" stroke="#4A3B52" stroke-width="3"/>
            </svg>

            <button id="again-btn" class="big-btn" type="button">Play Again! 🔁</button>
        </section>

    </main>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
